<div class="row d-flex align-items-end justify-content-end border border-3 rounded-4 shadow-lg border-primary my-3"
    id="filtros-expedientes" data-url="{% url 'Index:filtrar_expedientes_ajax' %}">


    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto">Estatus</div>
        <select name="estatus" id="estatus-select"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero">
            <option value="0">Todos</option>
            {% for option in estatus %}
            <option value="{{option.id}}">{{option.nombre}}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto">E.Negocios</div>
        <select name="usuarios" id="usuarios-select"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero">
            <option value="0">Cualquiera</option>
            {% for option in usuarios %}
            <option value="{{option.id}}">{{option.nombreCompleto}}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto">E.Credito</div>
        <select name="usuariosCredito" id="usuariosCredito-select"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero">
            <option value="0">Cualquiera</option>
            {% for option in usuariosCredito %}
            <option value="{{option.id}}">{{option.nombreCompleto}}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto">N. de socio</div>
        <input type="text" id="socio-input"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero"
            placeholder="Buscar por nombre">
    </div>

    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto"> Desde</div>
        <input type="date" id="fecha-inicio-input" name="fecha_inicio"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero">
    </div>

    <div class="col-lg-2 col-6">
        <div class="fnSuperiorRegularTitle3 text-quinto"> Hasta</div>
        <input type="date" id="fecha-fin-input" name="fecha_fin"
            class="w-100 filtro-input rounded rounded-4 py-1 px-2 border border-2 border-tercero">
    </div>
    <div class="col-lg-2 col-6 py-2">
        <button id="boton-reset-datos" class="btn bg-quinto text-white rounded rounded-4 py-1  w-100">
            Reiniciar
        </button>
    </div>

</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    $(document).ready(function () {
        const filtrosContainer = document.getElementById('filtros-expedientes');

        if (!filtrosContainer) return;

        const filterUrl = filtrosContainer.dataset.url;

        const estatusSelect = document.getElementById('estatus-select');
        const usuariosSelect = document.getElementById('usuarios-select');
        const usuariosCreditoSelect = document.getElementById('usuariosCredito-select');
        const socioInput = document.getElementById('socio-input');
        const fechaInicioInput = document.getElementById('fecha-inicio-input');
        const fechaFinInput = document.getElementById('fecha-fin-input');
        const botonReset = document.getElementById('boton-reset-datos');

        function ejecutarFiltro(page = 1) {
            const params = {
                'estatus': estatusSelect.value,
                'usuarios': usuariosSelect.value,
                'usuariosCredito': usuariosCreditoSelect.value,
                'socio': socioInput.value,
                'fecha_inicio': fechaInicioInput.value,
                'fecha_fin': fechaFinInput.value,
                'page': page
            };

            $.ajax({
                url: filterUrl,
                type: 'GET',
                data: params,
                success: function (response) {
                    $('#resultados-expedientes').html(response);
                },
                error: function (xhr, status, error) {
                    console.error("Error AJAX:", error);
                }
            });
        }

        function resetearFiltros() {
            estatusSelect.value = "0";
            usuariosSelect.value = "0";
            usuariosCreditoSelect.value = "0";
            socioInput.value = "";
            fechaInicioInput.value = "";
            fechaFinInput.value = "";
            ejecutarFiltro(1);
        }

        // Triggers
        estatusSelect.addEventListener('change', () => ejecutarFiltro(1));
        usuariosSelect.addEventListener('change', () => ejecutarFiltro(1));
        usuariosCreditoSelect.addEventListener('change', () => ejecutarFiltro(1));
        fechaInicioInput.addEventListener('change', () => ejecutarFiltro(1));
        fechaFinInput.addEventListener('change', () => ejecutarFiltro(1));

        let timeoutId;
        socioInput.addEventListener('input', function () {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => ejecutarFiltro(1), 100);
        });

        if (botonReset) botonReset.addEventListener('click', resetearFiltros);

        // Paginar desde botones dinámicos
        $(document).on('click', '.paginar', function () {
            const page = $(this).data('page');
            ejecutarFiltro(page);
        });

        // Carga inicial con page=1
        ejecutarFiltro(1);
    });
</script>
